<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriPlan — My Profiles</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --teal: #1a9e8f;
    --teal-light: #e6f7f5;
    --teal-dark: #14786c;
    --bg: #f5f6f8;
    --white: #ffffff;
    --text: #1c2230;
    --muted: #6b7280;
    --border: #e2e5ea;
    --card-shadow: 0 2px 16px rgba(0,0,0,0.07);
    --radius: 16px;
    --radius-sm: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; min-height: 100vh; }

  nav {
    position: sticky; top: 0; z-index: 100;
    background: var(--white); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 60px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }
  .nav-brand { font-family: 'Fraunces', serif; font-size: 1.3rem; color: var(--teal); font-weight: 600; letter-spacing: -0.5px; text-decoration: none; }
  .nav-brand span { color: var(--text); font-weight: 300; font-style: italic; }
  .nav-links { display: flex; gap: 6px; }
  .nav-links a { text-decoration: none; color: var(--muted); font-size: 13.5px; font-weight: 500; padding: 6px 14px; border-radius: 20px; transition: all 0.2s; }
  .nav-links a:hover, .nav-links a.active { background: var(--teal-light); color: var(--teal); }

  .page-hero {
    background: linear-gradient(160deg, #f0faf9 0%, #f5f6f8 70%);
    border-bottom: 1px solid var(--border);
    padding: 40px 24px 32px;
    text-align: center;
  }
  .page-hero h1 { font-family: 'Fraunces', serif; font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .page-hero h1 em { color: var(--teal); font-style: italic; }
  .page-hero p { color: var(--muted); font-size: 14.5px; max-width: 460px; margin: 0 auto; }

  .page-outer { max-width: 900px; margin: 0 auto; padding: 32px 20px 80px; }

  /* Profile Chips */
  .profiles-section { background: var(--white); border-radius: var(--radius); box-shadow: var(--card-shadow); border: 1px solid var(--border); padding: 28px; margin-bottom: 28px; animation: fadeUp 0.4s ease both; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--teal); margin-bottom: 6px; }
  .section-title { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 600; color: var(--text); margin-bottom: 18px; }

  .profile-chips-wrap { display: flex; flex-wrap: wrap; gap: 10px; }
  .profile-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: 50px;
    border: 1.5px solid var(--border); background: var(--bg);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    color: var(--text); cursor: pointer; transition: all 0.2s;
    user-select: none;
  }
  .profile-chip:hover { border-color: var(--teal); color: var(--teal); background: var(--teal-light); }
  .profile-chip.active { background: var(--teal); border-color: var(--teal); color: #fff; }
  .profile-chip-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--teal-light); color: var(--teal-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    transition: background 0.2s, color 0.2s;
  }
  .profile-chip.active .profile-chip-avatar { background: rgba(255,255,255,0.25); color: #fff; }
  .profile-chip-delete {
    margin-left: 4px; opacity: 0.5; font-size: 14px; line-height: 1;
    transition: opacity 0.2s; cursor: pointer; padding: 0 2px;
  }
  .profile-chip-delete:hover { opacity: 1; }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--muted);
  }
  .empty-state .es-icon { font-size: 2.8rem; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; margin-bottom: 16px; }
  .empty-state a { display: inline-block; background: var(--teal); color: #fff; text-decoration: none; padding: 11px 28px; border-radius: var(--radius-sm); font-weight: 600; font-size: 14px; transition: background 0.2s; }
  .empty-state a:hover { background: var(--teal-dark); }

  /* Detail Panel */
  .detail-panel {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--card-shadow); border: 1px solid var(--border);
    padding: 28px; animation: fadeUp 0.4s ease both;
    display: none;
  }
  .detail-panel.visible { display: block; }

  .detail-header {
    display: flex; align-items: center; gap: 16px;
    padding-bottom: 20px; border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .detail-avatar {
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--teal-light); color: var(--teal);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 600;
    flex-shrink: 0;
  }
  .detail-name { font-family: 'Fraunces', serif; font-size: 1.4rem; font-weight: 600; color: var(--text); }
  .detail-sub { font-size: 13px; color: var(--muted); }

  .loading-state {
    text-align: center; padding: 40px 20px; color: var(--muted);
  }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--teal); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .metric-card {
    background: var(--bg); border-radius: var(--radius-sm);
    padding: 16px 14px; text-align: center; border: 1px solid var(--border);
  }
  .metric-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .metric-value { font-family: 'Fraunces', serif; font-size: 1.6rem; font-weight: 600; color: var(--teal); line-height: 1; margin-bottom: 3px; }
  .metric-sub { font-size: 11px; color: var(--muted); }

  .detail-section { margin-bottom: 20px; }
  .detail-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--teal); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--teal-light); }
  .detail-row { display: flex; gap: 8px; margin-bottom: 7px; font-size: 14px; }
  .detail-key { font-weight: 600; color: var(--text); min-width: 160px; flex-shrink: 0; }
  .detail-val { color: var(--muted); }

  .tags-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
  .tag {
    background: var(--teal-light); color: var(--teal-dark);
    border-radius: 20px; padding: 4px 12px;
    font-size: 12.5px; font-weight: 600;
  }
  .tag.red { background: #fef2f2; color: #dc2626; }
  .tag.amber { background: #fffbeb; color: #92400e; }

  .error-box {
    background: #fef2f2; border: 1.5px solid #fca5a5;
    border-radius: var(--radius-sm); padding: 16px 18px;
    color: #dc2626; font-size: 14px; text-align: center;
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 640px) {
    nav { padding: 0 16px; }
    .detail-grid { grid-template-columns: 1fr 1fr; }
    .detail-key { min-width: 130px; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">Nutri<span>Plan</span></a>
  <div class="nav-links">
    <a href="index.html">Form</a>
    <a href="education.html">Education</a>
    <a href="profile.html" class="active">Profiles</a>
    <a href="comments.html">Comments</a>
  </div>
</nav>

<section class="page-hero">
  <h1>My <em>Saved</em> Profiles</h1>
  <p>Select a profile to view your full personalized diet plan details fetched from our records.</p>
</section>

<div class="page-outer">

  <!-- Profiles list -->
  <div class="profiles-section">
    <div class="section-label">Saved Profiles</div>
    <div class="section-title">Choose a Profile</div>
    <div class="profile-chips-wrap" id="profile-chips-wrap">
      <!-- Injected by JS -->
    </div>
  </div>

  <!-- Detail Panel -->
  <div class="detail-panel" id="detail-panel">
    <!-- Injected by JS -->
  </div>

</div>

<script>
// ─── CONFIG ────────────────────────────────────────────────
const SHEET_URL = "https://script.google.com/macros/s/AKfycbwwrNauZmqZe6jXml0xr4wYkJY6R17pZDYpXDHNYmIkYIYVR0Vk7HJ5LrQ7yU9kb5i6Xg/exec";

// ─── PROFILES FROM localStorage ────────────────────────────
function getProfiles() {
  try {
    return JSON.parse(localStorage.getItem('nutriplan_profiles') || '[]');
  } catch { return []; }
}

function saveProfiles(profiles) {
  localStorage.setItem('nutriplan_profiles', JSON.stringify(profiles));
}

function deleteProfile(userId) {
  const profiles = getProfiles().filter(p => p.id !== userId);
  saveProfiles(profiles);
  renderChips();
  document.getElementById('detail-panel').classList.remove('visible');
  document.getElementById('detail-panel').innerHTML = '';
}

// ─── RENDER PROFILE CHIPS ──────────────────────────────────
let activeUserId = null;

function renderChips() {
  const wrap = document.getElementById('profile-chips-wrap');
  const profiles = getProfiles();

  if (profiles.length === 0) {
    wrap.innerHTML = `
      <div class="empty-state" style="width:100%">
        <div class="es-icon">🥗</div>
        <p>No profiles saved yet. Submit the form to create your first profile.</p>
        <a href="index.html">Go to Diet Planner →</a>
      </div>`;
    return;
  }

  wrap.innerHTML = profiles.map(p => {
    const initials = p.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
    const isActive = p.id === activeUserId;
    return `
      <div class="profile-chip ${isActive ? 'active' : ''}" onclick="selectProfile('${p.id}', this)">
        <div class="profile-chip-avatar">${initials}</div>
        <span>${p.name}</span>
        <span class="profile-chip-delete" onclick="event.stopPropagation(); confirmDelete('${p.id}', '${p.name.replace(/'/g,"\\'")}')">✕</span>
      </div>`;
  }).join('');
}

function confirmDelete(userId, name) {
  if (confirm(`Remove profile "${name}" from this browser?\n\nThis only removes it locally — your data in Google Sheets is kept.`)) {
    deleteProfile(userId);
  }
}

// ─── SELECT & FETCH PROFILE ───────────────────────────────
async function selectProfile(userId, chipEl) {
  activeUserId = userId;

  // Update active chip styling
  document.querySelectorAll('.profile-chip').forEach(c => c.classList.remove('active'));
  chipEl.classList.add('active');

  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');
  panel.innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Fetching your profile data…</p>
    </div>`;
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

  try {
    const res = await fetch(`${SHEET_URL}?userId=${encodeURIComponent(userId)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    if (!data || data.error) {
      panel.innerHTML = `<div class="error-box">⚠️ ${data?.error || 'Profile data not found. It may still be syncing — try again in a moment.'}</div>`;
      return;
    }

    renderDetail(panel, data);
  } catch (err) {
    panel.innerHTML = `
      <div class="error-box">
        ⚠️ Could not fetch profile data.<br/>
        <small style="opacity:0.7;">${err.message}</small><br/><br/>
        <small>Make sure your Apps Script is deployed as a web app with "Anyone" access.</small>
      </div>`;
  }
}

// ─── RENDER FULL DETAIL ───────────────────────────────────
function renderDetail(panel, d) {
  const initials = (d.name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);

  function tagList(str, cls = '') {
    if (!str) return '<span style="color:var(--muted);font-size:13px;">—</span>';
    return str.split(',').map(s => s.trim()).filter(Boolean)
      .map(s => `<span class="tag ${cls}">${s}</span>`).join('');
  }

  function row(key, val) {
    return `<div class="detail-row"><span class="detail-key">${key}</span><span class="detail-val">${val || '—'}</span></div>`;
  }

  panel.innerHTML = `
    <div class="detail-header">
      <div class="detail-avatar">${initials}</div>
      <div>
        <div class="detail-name">${d.name || '—'}</div>
        <div class="detail-sub">Submitted on ${d.timestamp || '—'}</div>
      </div>
    </div>

    <!-- BODY METRICS -->
    <div class="detail-grid">
      <div class="metric-card">
        <div class="metric-label">BMI</div>
        <div class="metric-value">${d.bmi || '—'}</div>
        <div class="metric-sub">${d.bmi_category || ''}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Body Fat</div>
        <div class="metric-value">${d.body_fat || '—'}</div>
        <div class="metric-sub">percent</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Daily Calories</div>
        <div class="metric-value">${d.daily_calories || '—'}</div>
        <div class="metric-sub">kcal / day</div>
      </div>
    </div>

    <!-- PERSONAL INFO -->
    <div class="detail-section">
      <div class="detail-section-title">Personal Info</div>
      ${row('Age', d.age ? d.age + ' yrs' : null)}
      ${row('Gender', d.gender)}
      ${row('Height', d.height_cm ? d.height_cm + ' cm' : null)}
      ${row('Weight', d.weight_kg ? d.weight_kg + ' kg' : null)}
      ${row('Waist', d.waist_cm ? d.waist_cm + ' cm' : null)}
      ${row('Neck', d.neck_cm ? d.neck_cm + ' cm' : null)}
      ${d.hip_cm ? row('Hip', d.hip_cm + ' cm') : ''}
      ${row('Activity Level', d.activity)}
      ${d.pregnant_lactating && d.pregnant_lactating !== 'No' ? row('Pregnant/Lactating', d.pregnant_lactating) : ''}
    </div>

    <!-- HEALTH -->
    <div class="detail-section">
      <div class="detail-section-title">Health Info</div>
      <div class="detail-row">
        <span class="detail-key">Health Conditions</span>
        <span class="detail-val">
          <div class="tags-wrap">${tagList(d.health_conditions, 'amber')}</div>
        </span>
      </div>
      ${d.allergies ? `<div class="detail-row" style="margin-top:8px;">
        <span class="detail-key">Allergies</span>
        <span class="detail-val"><div class="tags-wrap">${tagList(d.allergies, 'red')}</div></span>
      </div>` : ''}
    </div>

    <!-- DIET PREFERENCES -->
    <div class="detail-section">
      <div class="detail-section-title">Diet Preferences</div>
      ${row('Diet Type', d.diet_preference)}
      ${row('Meals Per Day', d.meals_per_day)}
      ${row('Eating Window', d.eating_window)}
      <div class="detail-row">
        <span class="detail-key">Meal Types</span>
        <span class="detail-val"><div class="tags-wrap">${tagList(d.meal_types)}</div></span>
      </div>
    </div>

    <!-- FOOD PREFERENCES -->
    <div class="detail-section">
      <div class="detail-section-title">Food Preferences</div>
      ${d.morning_drinks ? `<div class="detail-row"><span class="detail-key">Morning Drinks</span><span class="detail-val"><div class="tags-wrap">${tagList(d.morning_drinks)}</div></span></div>` : ''}
      ${d.fruits ? `<div class="detail-row" style="margin-top:8px;"><span class="detail-key">Fruits</span><span class="detail-val"><div class="tags-wrap">${tagList(d.fruits)}</div></span></div>` : ''}
      ${d.vegetables ? `<div class="detail-row" style="margin-top:8px;"><span class="detail-key">Vegetables</span><span class="detail-val"><div class="tags-wrap">${tagList(d.vegetables)}</div></span></div>` : ''}
      ${d.nuts_seeds ? `<div class="detail-row" style="margin-top:8px;"><span class="detail-key">Nuts & Seeds</span><span class="detail-val"><div class="tags-wrap">${tagList(d.nuts_seeds)}</div></span></div>` : ''}
    </div>

    <!-- SYMPTOMS -->
    ${d.symptoms ? `
    <div class="detail-section">
      <div class="detail-section-title">Symptoms</div>
      <div class="tags-wrap">${tagList(d.symptoms, 'amber')}</div>
    </div>` : ''}

    <!-- COMMENTS -->
    ${d.comments ? `
    <div class="detail-section">
      <div class="detail-section-title">Notes & Comments</div>
      <p style="font-size:14px;color:var(--muted);background:var(--bg);padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);line-height:1.7;">${d.comments}</p>
    </div>` : ''}
  `;
}

// ─── INIT ─────────────────────────────────────────────────
renderChips();
</script>
</body>
</html>
